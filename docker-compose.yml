      PORT: 4000
      CORS_ORIGIN: "*"
      DATABASE_PATH: /app/data/app.db
      SCRIPTS_DIR: /home/xghrtkl/playwright-runner-platform/scripts
      ARTIFACTS_DIR: /home/xghrtkl/playwright-runner-platform/artifacts
      WORKSPACES_DIR: /home/xghrtkl/playwright-runner-platform/workspaces
      RUNNER_IMAGE: playwright-test-runner:local
      MAX_RUN_MS: 600000
      RUN_CPU_LIMIT: "2.0"
      RUN_MEMORY_LIMIT: 2g
      LOG_LEVEL: info
      SUPABASE_URL: https://dceuylqqzkleyiygbqrb.supabase.co
      SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRjZXV5bHFxemtsZXlpeWdicXJiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExODEyMjIsImV4cCI6MjA5Njc1NzIyMn0.1NfZOjIGaagJaHYaOypxpVV8gvsRY1tN1Y_IpUPTkyA
    ports:
      - "4000:4000"
    volumes:
      - ./data:/app/data
      - ./scripts:/home/xghrtkl/playwright-runner-platform/scripts
      - ./artifacts:/home/xghrtkl/playwright-runner-platform/artifacts
      - ./workspaces:/home/xghrtkl/playwright-runner-platform/workspaces
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - runner-image
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:4000}
        NEXT_PUBLIC_WS_BASE_URL: ${NEXT_PUBLIC_WS_BASE_URL:-ws://localhost:4000}
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:4000}
      NEXT_PUBLIC_WS_BASE_URL: ${NEXT_PUBLIC_WS_BASE_URL:-ws://localhost:4000}
    ports:
      - "3002:3000"
    depends_on:
      - backend
    restart: unless-stopped

  runner-image:
    build:
      context: ./runner
    image: playwright-test-runner:local
    command: ["bash", "-lc", "echo Runner image built"]
