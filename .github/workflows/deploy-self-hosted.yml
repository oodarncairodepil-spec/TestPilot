name: Deploy On Self-Hosted Runner

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: testpilot-self-hosted-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: [self-hosted, linux, x64, testpilot]
    timeout-minutes: 30
    steps:
      - name: Sync server repo to origin/main
        shell: bash
        env:
          REPO_DIR: /home/xghrtkl/TestPilot
        run: |
          set -euo pipefail
          if [ ! -d "${REPO_DIR}/.git" ]; then
            echo "Missing deploy repo at ${REPO_DIR}" >&2
            exit 1
          fi

          git -C "${REPO_DIR}" fetch --prune origin main
          git -C "${REPO_DIR}" checkout main
          # Deployment mirror: overwrite local uncommitted code to match GitHub main.
          git -C "${REPO_DIR}" reset --hard origin/main
          git -C "${REPO_DIR}" clean -fd

      - name: Ensure frontend env file exists
        shell: bash
        env:
          REPO_DIR: /home/xghrtkl/TestPilot
        run: |
          set -euo pipefail
          ENV_FILE="${REPO_DIR}/.env"
          if [ ! -f "${ENV_FILE}" ]; then
            printf '%s\n' \
              'NEXT_PUBLIC_API_BASE_URL=http://x300.taila1632d.ts.net:4000' \
              'NEXT_PUBLIC_WS_BASE_URL=ws://x300.taila1632d.ts.net:4000' \
              > "${ENV_FILE}"
          fi

      - name: Rebuild and restart services
        shell: bash
        env:
          COMPOSE_FILE: /home/xghrtkl/TestPilot/docker-compose.yml
        run: |
          set -euo pipefail

          # Stop the current stack first so host ports can be re-bound cleanly.
          docker compose -p testpilot -f "${COMPOSE_FILE}" down --remove-orphans || true

          # Remove legacy fixed-name containers from older compose versions.
          docker rm -f playwright-runner-backend playwright-runner-frontend 2>/dev/null || true

          # If any other container is still binding deploy ports, remove it to unblock deploy.
          CONFLICT_IDS="$(docker ps --format '{{.ID}} {{.Ports}}' | awk '/(^|,)0\.0\.0\.0:4000->|(^|,):::4000->|(^|,)0\.0\.0\.0:3002->|(^|,):::3002->/ {print $1}')"
          if [ -n "${CONFLICT_IDS}" ]; then
            docker rm -f ${CONFLICT_IDS}
          fi

          docker compose -p testpilot -f "${COMPOSE_FILE}" build
          docker compose -p testpilot -f "${COMPOSE_FILE}" up -d --remove-orphans

      - name: Show deployed commit
        shell: bash
        run: git -C /home/xghrtkl/TestPilot rev-parse --short HEAD
